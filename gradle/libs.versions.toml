filament = { group = "com.google.android.filament", name = "filament", version.ref = "filament" }
filament-android = { group = "com.google.android.filament", name = "filament-android", version.ref = "filament" }
filament-utils = { group = "com.google.android.filament", name = "filament-utils", version.ref = "filament" }
