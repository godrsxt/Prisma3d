[versions]
agp = "8.7.2"
kotlin = "2.0.21"
composeBom = "2024.10.01"
lifecycle = "2.8.4"
navigation = "2.8.4"
room = "2.6.1"
datastore = "1.1.4"
coroutines = "1.8.1"
serialization = "1.7.1"
okhttp = "4.12.0"
retrofit = "2.11.0"
moshi = "1.15.2"
coil = "2.7.0"
filament = "1.56.1"
glslang = "14.1.0"
spirvCross = "2024.07.01"
assimp = "5.4.3"
glm = "1.0.1"
eigen = "3.4.0"
compileSdk = "34"
minSdk = "24"
targetSdk = "34"
composeCompilerVersion = "2.0.21"

[libraries]
# Android Gradle Plugin (usually plugin, but version defined here)
# AGP Plugin defined in [plugins]

# Kotlin
kotlin-stdlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlin" }
kotlin-reflect = { group = "org.jetbrains.kotlin", name = "kotlin-reflect", version.ref = "kotlin" }
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "coroutines" }
