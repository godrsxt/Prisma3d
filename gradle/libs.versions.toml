datastore-core-rxjava2 = { group = "androidx.datastore", name = "datastore-core-rxjava2", version.ref = "datastore" }
datastore-core-rxjava3 = { group = "androidx.datastore", name = "datastore-core-rxjava3", version.ref = "datastore" }

# Coroutines (Flow included in coroutines-core)
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-reactive = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-reactive", version.ref = "coroutines" }
kotlinx-coroutines-rxjava2 = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-rxjava2", version.ref = "coroutines" }
kotlinx-coroutines-rxjava3 = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-rxjava3", version.ref = "coroutines" }
