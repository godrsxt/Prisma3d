# glslang
glslang = { group = "com.google.android.filament", name = "glslang", version.ref = "glslang" }

# spirv-cross
spirv-cross = { group = "com.google.android.filament", name = "spirv-cross", version.ref = "spirvCross" }

# Assimp
assimp = { group = "org.assimp", name = "assimp", version.ref = "assimp" }

# GLM (Header only, usually not a maven artifact, but requested. Providing a maven wrapper if available or note. There is a port: 'org.cpp-dependencies:glm')
glm = { group = "org.cpp-dependencies", name = "glm", version.ref = "glm" }

# Eigen (Header only, maven port: 'org.cpp-dependencies:eigen')
eigen = { group = "org.cpp-dependencies", name = "eigen", version.ref = "eigen" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
